name = "haiku"
adapter = "claude-cli"
model = "claude-haiku-4-5"
strategy = "single-session"
effort = "high"

# Tier axis, weak tier. Same single-session bare harness as `bare`/`sonnet`, only the
# model changes. On an instrument with real failure headroom this tests whether the
# tier ladder discriminates (and is the likely place the gate/review arms show lift --
# a weaker model that skips or botches self-verification).
[tools]
source = "none"
allowed = ["Read", "Write", "Edit", "Glob", "Grep", "Bash(python:*)"]

[limits]
trial_timeout_s = 1800
