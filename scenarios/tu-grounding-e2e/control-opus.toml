name = "control-opus"
adapter = "claude-cli"
model = "claude-opus-4-8"
strategy = "single-session"
effort = "medium"

# CONTROL, strong tier. Identical to control-haiku except `model`.
[plugins]
mount = ["assets/plugin-1121"]

[env]
VIRTUAL_ENV = 'C:/Users/grima/Documents/treasuryutils-dev/.venv'
PATH = 'C:/Users/grima/Documents/treasuryutils-dev/.venv/Scripts;${PATH}'

[tools]
source = "none"
allowed = ["Read", "Glob", "Grep", "Write", "Edit", "Skill"]

[limits]
trial_timeout_s = 600
