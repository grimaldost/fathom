name = "rg2x2-verif-ctrl-haiku"
adapter = "claude-cli"
model = "claude-haiku-4-5"
strategy = "single-session"
effort = "medium"

[tools]
source = "none"
allowed = ["Read", "Write", "Edit", "Glob", "Grep", "Bash(python:*)", "Skill"]

[plugins]
mount = [
    "../rg-assets/plugins-baseline/humblepowers",
    "../rg-assets/plugins-baseline/engineering-discipline",
    "../rg-assets/plugins-baseline/session-workflow",
]

[limits]
trial_timeout_s = 600
