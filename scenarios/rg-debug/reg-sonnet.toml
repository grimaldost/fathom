name = "rg2x2-debug-reg-sonnet"
adapter = "claude-cli"
model = "claude-sonnet-5"
strategy = "single-session"
effort = "medium"

[tools]
source = "none"
allowed = ["Read", "Write", "Edit", "Glob", "Grep", "Bash(python:*)", "Skill"]

[plugins]
mount = [
    "../rg-assets/plugins-directive/humblepowers",
    "../rg-assets/plugins-directive/engineering-discipline",
    "../rg-assets/plugins-directive/session-workflow",
]

[limits]
trial_timeout_s = 600
