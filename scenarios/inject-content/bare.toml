name = "bare"
adapter = "claude-cli"
model = "claude-sonnet-5"
strategy = "single-session"
effort = "high"

# Control arm: full toolkit mounted (skills loadable, same capability surface as
# the treatment arms), NO injected dispatch content. The arm distinction across
# this scenario dir is [context] inject ONLY.
[tools]
source = "none"
allowed = ["Read", "Write", "Edit", "Glob", "Grep", "Task", "Skill", "PowerShell", "Bash"]

[plugins]
mount = [
    "../../tasks/inject-content-v1/plugins/humblepowers",
    "../../tasks/inject-content-v1/plugins/engineering-discipline",
    "../../tasks/inject-content-v1/plugins/session-workflow",
]

[limits]
trial_timeout_s = 1200
