name = "haiku"
adapter = "claude-cli"
model = "claude-haiku-4-5"
strategy = "single-session"
effort = "high"

# Weak tier (the routing control). Arms differ ONLY by `model`; identical tools,
# strategy, effort, and limits so the contrast is the model. No `Task` — each arm is a
# clean single-session solve (no subagent orchestration to confound the model axis).
# Limits sized for the WEAKEST model's longer, more-iterative runs (FM-12) so Haiku's
# hard-band attempts are not truncated into ERRORED and dropped (a false ceiling).
[tools]
source = "none"
allowed = ["Read", "Write", "Edit", "Glob", "Grep", "PowerShell", "Bash"]

[limits]
trial_timeout_s = 1800
