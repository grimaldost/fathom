name = "product-haiku"
adapter = "claude-cli"
model = "claude-haiku-4-5"
strategy = "single-session"
effort = "medium"

# Weak-tier arm: identical to product-sonnet except `model` — does the surface
# carry a cheaper model through the same persona questions? Optional at plan
# time (spec §6).
[plugins]
mount = ["assets/plugin-mock"]

[tools]
source = "none"
allowed = ["Read", "Glob", "Grep", "Write", "Edit", "mcp__plugin_dc_data"]

[limits]
trial_timeout_s = 900
