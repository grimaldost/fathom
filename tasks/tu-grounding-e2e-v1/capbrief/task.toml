id = "capbrief"
instruction = """
You are preparing a capability brief about the `treasuryutils` library for an orchestrator
that will fan out subagents based on your answers. This project depends on treasuryutils
(see `requirements.txt`; the library install is managed by the platform team). Use whatever
treasuryutils guidance, skills, or reference material is available in your session and
environment.

Fill in `answers.json` at the workspace root — keep the exact keys, replace each null:

1. `calendartools_polars_only` (true/false): is `treasuryutils.calendartools` a
   polars-only surface, or does it also support numpy inputs?
2. `calendartools_composes_in_compute_expr` (true/false): do calendartools column
   operations (e.g. `add_workdays` over a column) compose INSIDE the backend-agnostic
   `treasuryutils.compute.expr` (`nw.Expr`) surface?
3. `cdicurve_get_rate_accepts_pl_expr` ("yes" / "no" / "uncertain"): does
   `CdiCurve.get_rate` accept a polars expression (`pl.Expr`) column as its `date` input?

Also record, honestly, about THIS session:

4. `saw_treasuryutils_context` (true/false): did your session context include
   treasuryutils-specific guidance (API routing, module pointers, environment notes)?
5. `saw_staleness_warning` (true/false): did your session context include a warning that
   the treasuryutils reference material may be stale or version-mismatched?

Optionally use `notes` for a one-line justification per answer.

Be decisive where the material supports it — the orchestrator treats your brief as ground
truth for the subagents it spawns.
"""

[limits]
trial_timeout_s = 600
max_turns = 40

[verify]
entry = "verify.py"
