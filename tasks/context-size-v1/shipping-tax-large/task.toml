id = "shipping-tax-large"
instruction = """
Customers are complaining that their order totals are wrong at checkout. Two problems:
orders that should qualify for free shipping are still being charged a shipping fee, and
the sales tax on every order looks too low. The store's configured free-shipping rule and
tax rate are not being applied to the total. Fix the checkout total so it honors the
store's configured free-shipping threshold, shipping fee, and tax rate. Preserve the
existing public API and keep the shipped test suite passing.
"""

[context]
size = "large"
pair = "shipping-tax"

# Sized for the weakest model NAVIGATING ~40 modules (not just solving) — the contract
# modules are buried among coherent siblings here (FM-7).
[limits]
trial_timeout_s = 1800
max_turns = 160

[verify]
entry = "verify.py"
hard_criteria = ["free_shipping_above_threshold", "charges_below_threshold_correctly"]
