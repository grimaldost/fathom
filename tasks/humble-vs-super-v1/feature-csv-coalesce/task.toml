id = "feature-csv-coalesce"
instruction = """
Implement the typed CSV coalescing reader described in SPEC.md. Extend the
existing `csvcoalesce` package (pure standard library — add no dependencies) so
that `parse_csv` is importable as `from csvcoalesce import parse_csv` and behaves
exactly as SPEC.md specifies. Keep the existing `Column` model and the baseline
tests passing.

Add unit tests under `tests/` (run with `python -m unittest discover -s tests -t .`
from the project root) covering the happy path and each edge case SPEC.md names:
empty input, ragged rows, and empty-cell / type coercion.
"""

[limits]
# Sized for the LONGEST arm. With Task allowed (spec §8), discipline arms can fan
# out into subagents (humble planned-execution / super subagent-driven-development)
# and run a reproducing-test-then-implement loop, so they need materially more
# turns/wall-clock than a bare one-shot. These ceilings give every arm headroom to
# finish (FM-11: discipline arms must not be truncated out of the per-criterion table).
trial_timeout_s = 2400
max_turns = 100

[verify]
entry = "verify.py"
