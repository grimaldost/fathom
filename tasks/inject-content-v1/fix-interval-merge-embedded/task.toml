I'm prepping the release notes for tomorrow and QA flagged the `intervals`
package again: `merge()` sometimes leaves two ranges separate when they clearly
should have become one, and other times the merged range comes back shorter
than one of the inputs that went into it. Nikhil tried a patch last sprint that
made it worse, so we reverted. Can you get `merge` behaving as documented?
Public API stays as it is, and the shipped test suite keeps passing.
"""

